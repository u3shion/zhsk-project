services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      USERS_DB_NAME: ${USERS_DB_NAME}
      USERS_DB_USER: ${USERS_DB_USER}
      USERS_DB_PASSWORD: ${USERS_DB_PASSWORD}
      METERS_DB_NAME: ${METERS_DB_NAME}
      METERS_DB_USER: ${METERS_DB_USER}
      METERS_DB_PASSWORD: ${METERS_DB_PASSWORD}
      ANNOUNCEMENTS_DB_NAME: ${ANNOUNCEMENTS_DB_NAME}
      ANNOUNCEMENTS_DB_USER: ${ANNOUNCEMENTS_DB_USER}
      ANNOUNCEMENTS_DB_PASSWORD: ${ANNOUNCEMENTS_DB_PASSWORD}
      NOTIFICATIONS_DB_NAME: ${NOTIFICATIONS_DB_NAME}
      NOTIFICATIONS_DB_USER: ${NOTIFICATIONS_DB_USER}
      NOTIFICATIONS_DB_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD}
      CHAT_DB_NAME: ${CHAT_DB_NAME}
      CHAT_DB_USER: ${CHAT_DB_USER}
      CHAT_DB_PASSWORD: ${CHAT_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${USERS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  users:
    build:
      context: ./users
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${USERS_DB_USER}:${USERS_DB_PASSWORD}@postgres:5432/${USERS_DB_NAME}
      ADMIN_SECRET: ${USERS_ADMIN_SECRET}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${USERS_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  meters:
    build:
      context: ./meters
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${METERS_DB_USER}:${METERS_DB_PASSWORD}@postgres:5432/${METERS_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${METERS_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/announcements-photos;
        mc anonymous set download local/announcements-photos;
        echo "MinIO initialized: announcements-photos bucket ready"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  announcements:
    build:
      context: ./announcements
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${ANNOUNCEMENTS_DB_USER}:${ANNOUNCEMENTS_DB_PASSWORD}@postgres:5432/${ANNOUNCEMENTS_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: announcements-photos
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    ports:
      - "${ANNOUNCEMENTS_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${NOTIFICATIONS_DB_USER}:${NOTIFICATIONS_DB_PASSWORD}@postgres:5432/${NOTIFICATIONS_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      SERVICE_KEY: ${SERVICE_KEY}
      USERS_SERVICE_URL: http://users:8000
      METERS_SERVICE_URL: http://meters:8000
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN}
      VK_API_VERSION: ${VK_API_VERSION:-5.199}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "${NOTIFICATIONS_PORT:-8004}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${CHAT_DB_USER}:${CHAT_DB_PASSWORD}@postgres:5432/${CHAT_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${CHAT_PORT:-8005}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
