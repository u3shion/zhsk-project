include:
  - path: backend/docker-compose.yml
    env_file:
      - .env
  - path: frontend/docker-compose.yml
    env_file:
      - .env

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - users
      - meters
      - announcements
      - notifications
      - chat
      - frontend
