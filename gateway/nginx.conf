events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;

        # Auth & Users
        location /api/auth/ {
            set $users_upstream users:8000;
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://$users_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            set $users_upstream users:8000;
            rewrite ^/api/users/(.*)$ /users/$1 break;
            proxy_pass http://$users_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Meters
        location /api/readings/ {
            limit_req zone=api burst=20 nodelay;
            set $meters_upstream meters:8000;
            rewrite ^/api/readings/(.*)$ /readings/$1 break;
            proxy_pass http://$meters_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/water-meters/ {
            limit_req zone=api burst=20 nodelay;
            set $meters_upstream meters:8000;
            rewrite ^/api/water-meters/(.*)$ /water-meters/$1 break;
            proxy_pass http://$meters_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Announcements
        location /api/announcements/ {
            limit_req zone=api burst=20 nodelay;
            client_max_body_size 6m;
            set $announcements_upstream announcements:8000;
            rewrite ^/api/announcements/(.*)$ /announcements/$1 break;
            proxy_pass http://$announcements_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notifications
        location /api/notifications/ {
            limit_req zone=api burst=10 nodelay;
            set $notifications_upstream notifications:8000;
            rewrite ^/api/notifications/(.*)$ /notifications/$1 break;
            proxy_pass http://$notifications_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Chat REST
        location /api/rooms/ {
            limit_req zone=api burst=20 nodelay;
            set $chat_upstream chat:8000;
            rewrite ^/api/rooms/(.*)$ /rooms/$1 break;
            proxy_pass http://$chat_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Chat WebSocket
        location /ws/ {
            set $chat_upstream chat:8000;
            proxy_pass http://$chat_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Frontend
        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
