events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    upstream users_service {
        server users:8000;
    }

    upstream meters_service {
        server meters:8000;
    }

    upstream announcements_service {
        server announcements:8000;
    }

    upstream notifications_service {
        server notifications:8000;
    }

    upstream chat_service {
        server chat:8000;
    }

    upstream frontend_service {
        server frontend:80;
    }

    server {
        listen 80;

        # ── Auth & Users ──────────────────────────────────────────────────────────
        location /api/auth/ {
            proxy_pass http://users_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://users_service/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Meters ────────────────────────────────────────────────────────────────
        location /api/readings/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://meters_service/readings/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/water-meters/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://meters_service/water-meters/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Announcements ─────────────────────────────────────────────────────────
        location /api/announcements/ {
            limit_req zone=api burst=20 nodelay;
            client_max_body_size 6m;
            proxy_pass http://announcements_service/announcements/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Notifications ─────────────────────────────────────────────────────────
        location /api/notifications/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://notifications_service/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Chat REST ─────────────────────────────────────────────────────────────
        location /api/rooms/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://chat_service/rooms/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Chat WebSocket ────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://chat_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Health check ──────────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Frontend (все остальные запросы) ──────────────────────────────────────
        location / {
            proxy_pass http://frontend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
